name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            os_label: linux
            label: Linux
            ext: ""
            archive_fmt: tar.gz
            archive_name: chunitools_linux
          - os: macos-latest
            os_label: macos
            label: macOS
            ext: ""
            archive_fmt: tar.gz
            archive_name: chunitools_macos
            fat_binary: true
          - os: windows-latest
            os_label: windows
            label: Windows
            ext: ".exe"
            archive_fmt: zip
            archive_name: chunitools_windows

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libegl1 libxkbcommon0 libfontconfig1

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install libxml2 2>/dev/null || true

      - name: Sync dependencies
        run: uv sync

      - name: Download vgmstream-cli
        shell: bash
        run: |
          python3 scripts/download_vgmstream.py "${{ matrix.os_label }}"
          echo "vgmstream status:"
          ls -la "vendor/vgmstream/${{ matrix.os_label }}/" 2>/dev/null || echo "(none, audio will fallback)"

      - name: Build with PyInstaller
        run: uv run pyinstaller --noconfirm chunitools.spec

      - name: Build x86_64 slice and create universal binary (macOS only)
        if: matrix.fat_binary
        shell: bash
        run: |
          set -e
          mkdir -p dist_x86
          arch -x86_64 uv run pyinstaller --noconfirm --distpath dist_x86 chunitools.spec
          if [ -f "dist/chunitools" ] && [ -f "dist_x86/chunitools" ]; then
            file dist/chunitools
            file dist_x86/chunitools
            lipo -create -output chunitools_universal dist/chunitools dist_x86/chunitools
            mv chunitools_universal dist/chunitools
            file dist/chunitools
          fi
          rm -rf dist_x86

      - name: Prepare archive
        shell: bash
        run: |
          ARCHIVE="${{ matrix.archive_name }}"
          EXT="${{ matrix.ext }}"
          mkdir -p "${ARCHIVE}"
          cp "dist/chunitools${EXT}" "${ARCHIVE}/"
          if [ -d "dist/vgmstream" ]; then
            cp -r "dist/vgmstream" "${ARCHIVE}/"
          fi
          echo "Files in ${ARCHIVE}:"
          ls -la "${ARCHIVE}/"

      - name: Create archive
        shell: bash
        run: |
          ARCHIVE="${{ matrix.archive_name }}"
          FMT="${{ matrix.archive_fmt }}"
          if [ "$FMT" = "zip" ]; then
            7z a "${ARCHIVE}.zip" "${ARCHIVE}/" 2>/dev/null || \
              zip -r "${ARCHIVE}.zip" "${ARCHIVE}/"
          else
            tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}/"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}.*
          if-no-files-found: error

  release:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: chunitools_*
          merge-multiple: true

      - name: List artifacts
        run: ls -lh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: chunitools ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            chunitools_linux.tar.gz
            chunitools_macos.tar.gz
            chunitools_windows.zip
